<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAQUE MATE A LAS AFP | Supension Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        .gold-border { border: 1px solid #b8912e; }
        .gold-text { color: #b8912e; }
        #splash-screen { position: fixed; inset: 0; z-index: 1000; background: #0f172a; display: flex; align-items: center; justify-content: center; animation: fadeOut 0.5s ease 3s forwards; }
        #splash-screen img { animation: zoomIn 3s ease-out forwards; max-width: 300px; }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1.2); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(15, 23, 42, 0.95); overflow-y: auto; }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .chapter-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; cursor: pointer; overflow: hidden; position: relative; }
        .chapter-card:hover { border-color: #b8912e; transform: translateY(-5px); }
        .lock-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    </style>
</head>
<body>

    <div id="splash-screen"><img src="https://i.ibb.co/k2wGdLjc/portada.jpg" alt="Portada"></div>

    <nav class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 sticky top-0 z-50 backdrop-blur-md">
        <button id="btn-login-trigger" onclick="toggleModal('login-modal')" class="bg-[#b8912e] text-white px-6 py-2 rounded-full font-bold text-sm">INICIO / LOGIN</button>
        <div id="user-display" class="hidden flex items-center gap-3">
            <span class="text-xs gold-text uppercase font-bold">Lector:</span>
            <span id="user-name-display" class="text-white font-semibold"></span>
            <button onclick="logout()" class="text-[10px] text-slate-500 underline ml-2">Salir</button>
        </div>
        <img src="https://i.ibb.co/k2wGdLjc/portada.jpg" class="w-10 h-10 rounded border border-gold-border object-cover">
    </nav>

    <main class="max-w-7xl mx-auto p-6 md:p-12">
        <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div onclick="openContent('intro')" class="chapter-card rounded-2xl col-span-full md:col-span-2 flex">
                <img src="https://i.ibb.co/5XVkxjpK/intro.jpg" class="w-1/3 object-cover">
                <div class="p-6">
                    <span class="text-[10px] text-green-500 font-bold uppercase tracking-widest">Acceso Gratuito</span>
                    <h3 class="text-2xl font-bold serif mt-1">Introducción: El Horizonte</h3>
                </div>
            </div>
            <div onclick="checkAccess('cap1')" class="chapter-card rounded-xl">
                <img src="https://i.ibb.co/9mcJ7LQ7/cap1.jpg" class="w-full h-48 object-cover">
                <div class="lock-overlay" id="lock-cap1">🔒</div>
                <div class="p-4 font-bold">Cap. 1: Ineficacia</div>
            </div>
            <div onclick="checkAccess('cap2')" class="chapter-card rounded-xl">
                <img src="https://i.ibb.co/5gKm1HxY/cap2.jpg" class="w-full h-48 object-cover">
                <div class="lock-overlay" id="lock-cap2">🔒</div>
                <div class="p-4 font-bold">Cap. 2: Jaque Probatorio</div>
            </div>
            <div onclick="checkAccess('cap3')" class="chapter-card rounded-xl">
                <img src="https://i.ibb.co/9mcJ7LQ7/cap3.jpg" class="w-full h-48 object-cover">
                <div class="lock-overlay" id="lock-cap3">🔒</div>
                <div class="p-4 font-bold">Cap. 3: Daño Previsional</div>
            </div>
            <div onclick="checkAccess('cap4')" class="chapter-card rounded-xl">
                <img src="https://i.ibb.co/NgG7DKqk/cap4.jpg" class="w-full h-48 object-cover">
                <div class="lock-overlay" id="lock-cap4">🔒</div>
                <div class="p-4 font-bold">Cap. 4: Pérdida de Chance</div>
            </div>
        </div>
    </main>
