<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JAQUE MATE A LAS AFP | Supension Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --text: #f8fafc; --card: rgba(30, 41, 59, 0.5); }
        .light-mode { --bg: #f8fafc; --text: #0f172a; --card: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; scroll-behavior: smooth; overflow-x: hidden; width: 100%; }
        .serif { font-family: 'Playfair Display', serif; }
        .gold-text { color: #b8912e; }
        
        #splash { position: fixed; inset: 0; z-index: 1000; background: #0f172a; display: flex; align-items: center; justify-content: center; animation: fadeOut 0.5s ease 3s forwards; }
        #splash img { animation: zoomIn 3s ease-out forwards; max-width: 260px; }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1.2); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.98); }
        .modal.active { display: flex; flex-direction: column; }

        /* CONTENEDOR MAESTRO PARA PDF EN MÓVIL */
        .pdf-container {
            flex: 1;
            width: 100%;
            height: 100%;
            -webkit-overflow-scrolling: touch;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            background: #333;
        }

        #pdf-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .pdf-header { padding: 10px; }
            #pdf-frame { width: 100vw; }
        }
    </style>
</head>
<body>

    <div id="splash"><img src="https://i.ibb.co/k2wGdLjc/portada.jpg"></div>

    <nav class="p-4 border-b border-slate-800 flex justify-between items-center sticky top-0 z-50 bg-slate-900/90 backdrop-blur">
        <div class="flex gap-2">
            <button onclick="toggleModal('login-modal')" id="btn-login" class="bg-[#b8912e] text-white px-5 py-2 rounded-xl text-xs font-bold uppercase">Acceso</button>
            <button onclick="toggleTheme()" class="px-3 py-2 border border-slate-700 rounded-xl text-xs">🌓</button>
        </div>
        <div id="user-info" class="hidden text-sm font-bold gold-text uppercase items-center gap-3">
            <span id="user-name"></span> 
            <span class="text-slate-700">|</span>
            <button onclick="location.reload()" class="bg-slate-800 px-3 py-1 rounded-lg text-slate-300 hover:text-white transition">SALIR</button>
        </div>
        <img src="https://i.ibb.co/k2wGdLjc/portada.jpg" class="w-10 h-10 rounded border border-[#b8912e] object-cover">
    </nav>

    <header class="py-12 text-center px-6">
        <h1 class="text-4xl md:text-6xl font-bold serif gold-text uppercase leading-tight">Jaque Mate a las AFP</h1>
        <p class="text-slate-300 mt-4 italic text-xl md:text-2xl font-semibold tracking-wide">Estrategia Jurídica César Cano</p>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-12 grid md:grid-cols-2 lg:grid-cols-4 gap-6">
        <div onclick="openPDF('intro')" class="cursor-pointer bg-slate-800/50 rounded-xl border border-green-500/30 overflow-hidden">
            <img src="https://i.ibb.co/5XVkxjpK/intro.jpg" class="h-44 w-full object-cover">
            <div class="p-4 flex justify-between items-center">
                <span class="font-bold text-xs uppercase text-green-500">Introducción</span>
                <span class="text-[10px] bg-green-500/10 px-2 py-1 rounded text-green-500 font-bold">ABIERTO</span>
            </div>
        </div>
        <div onclick="check('cap1')" class="relative cursor-pointer bg-slate-800/50 rounded-xl border border-slate-700 overflow-hidden">
            <img src="https://i.ibb.co/9mcJ7LQ7/cap1.jpg" class="h-44 w-full object-cover">
            <div class="absolute inset-0 bg-black/60 flex items-center justify-center text-2xl lock-icon">🔒</div>
            <div class="p-4 font-bold text-xs uppercase text-slate-400">Cap. 1: Ineficacia</div>
        </div>
        </main>

    <div id="pdf-modal" class="modal">
        <div class="pdf-header p-4 bg-slate-900 flex justify-between items-center border-b border-slate-800">
            <button onclick="toggleModal('pdf-modal')" class="text-white text-xs font-bold border border-slate-700 px-4 py-2 rounded-xl uppercase">CERRAR</button>
            <span id="pdf-title" class="gold-text font-bold text-xs uppercase tracking-widest"></span>
            <div class="w-10"></div>
        </div>
        <div class="pdf-container">
            <iframe id="pdf-frame" src="" allow="autoplay"></iframe>
        </div>
    </div>

    <div id="login-modal" class="modal">
        <div class="bg-slate-900 p-8 rounded-3xl border border-[#b8912e] max-w-sm w-full relative mx-4 m-auto">
            <button onclick="toggleModal('login-modal')" class="absolute top-4 right-4 text-slate-500">✕</button>
            <h2 class="text-xl serif mb-8 text-center gold-text font-bold uppercase">Ingresar</h2>
            <input type="text" id="u" placeholder="Correo" class="w-full bg-slate-800 p-4 rounded-xl mb-4 text-white border border-slate-700 outline-none">
            <input type="password" id="p" placeholder="Contraseña" class="w-full bg-slate-800 p-4 rounded-xl mb-6 text-white border border-slate-700 outline-none">
            <button onclick="login()" id="bLog" class="w-full bg-[#b8912e] py-4 rounded-xl font-bold uppercase text-sm">Validar Acceso</button>
            <p id="err" class="text-red-500 text-[10px] mt-4 text-center hidden font-bold"></p>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbybvaepAwxKd5HQzFhK0LjRDRT7HlkSyh_VaHjYDsUEApJDdMhGs1jgJVzjVhACrDgaqw/exec";
        let logged = false;

        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function toggleModal(id) { document.getElementById(id).classList.toggle('active'); }

        function login() {
            const u = document.getElementById('u').value.toLowerCase().trim();
            const p = document.getElementById('p').value.trim();
            const btn = document.getElementById('bLog');
            if(!u || !p) return;
            btn.innerText = "Ingresando...";
            const script = document.createElement('script');
            script.src = `${API}?user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}&callback=authCallback`;
            document.body.appendChild(script);
            document.body.removeChild(script);
        }

        function authCallback(data) {
            const btn = document.getElementById('bLog');
            const err = document.getElementById('err');
            btn.innerText = "Validar Acceso";
            if(data.result === "success") {
                logged = true;
                document.getElementById('btn-login').classList.add('hidden');
                document.getElementById('user-info').classList.replace('hidden', 'flex');
                document.getElementById('user-name').innerText = data.nombre;
                document.querySelectorAll('.lock-icon').forEach(l => l.style.display = 'none');
                toggleModal('login-modal');
            } else {
                err.innerText = "DATOS INCORRECTOS";
                err.classList.remove('hidden');
            }
        }

        function check(id) { logged ? openPDF(id) : toggleModal('login-modal'); }

        function openPDF(id) {
            document.getElementById('pdf-title').innerText = id;
            
            // URL ABSOLUTA DE TU ARCHIVO (Importante para que Google lo lea)
            const pdfUrl = window.location.origin + window.location.pathname.replace('ebook.html', '') + id + '.pdf';
            
            // Usamos Google Docs Viewer para forzar el ajuste de ancho y el scroll multipágina en móviles
            const finalUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(pdfUrl)}&embedded=true`;
            
            document.getElementById('pdf-frame').src = finalUrl;
            toggleModal('pdf-modal');
        }
    </script>
</body>
</html>
