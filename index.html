<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAQUE MATE A LAS AFP | Supension Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        .gold-border { border: 1px solid #b8912e; }
        .gold-text { color: #b8912e; }
        
        #splash-screen {
            position: fixed; inset: 0; z-index: 1000; background: #0f172a;
            display: flex; align-items: center; justify-content: center;
            animation: fadeOut 0.5s ease 3s forwards;
        }
        #splash-screen img { animation: zoomIn 3s ease-out forwards; max-width: 300px; }
        
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1.2); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(15, 23, 42, 0.95); overflow-y: auto; }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        
        .chapter-card { 
            background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.1); 
            transition: 0.3s; cursor: pointer; overflow: hidden;
        }
        .chapter-card:hover { border-color: #b8912e; transform: translateY(-5px); }
        .lock-icon-div { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); font-size: 2rem; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://i.ibb.co/k2wGdLjc/portada.jpg" alt="Portada">
    </div>

    <nav class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 sticky top-0 z-50 backdrop-blur-md">
        <button id="btn-login-trigger" onclick="toggleModal('login-modal')" class="bg-[#b8912e] text-white px-6 py-2 rounded-full font-bold text-sm hover:scale-105 transition-transform">
            INICIO / LOGIN
        </button>
        <div id="user-display" class="hidden flex items-center gap-3">
            <span class="text-xs gold-text uppercase font-bold">Lector:</span>
            <span id="user-name-display" class="text-white font-semibold"></span>
            <button onclick="logout()" class="text-[10px] text-slate-500 underline ml-2">Salir</button>
        </div>
        <img src="https://i.ibb.co/k2wGdLjc/portada.jpg" class="w-10 h-10 rounded border border-gold-border object-cover">
    </nav>

    <main class="max-w-7xl mx-auto p-6 md:p-12">
        <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <div onclick="openContent('intro')" class="chapter-card rounded-2xl col-span-full md:col-span-2 flex">
                <img src="https://i.ibb.co/5XVkxjpK/intro.jpg" class="w-1/3 object-cover bg-slate-800">
                <div class="p-6">
                    <span class="text-[10px] text-green-500 font-bold uppercase tracking-widest">Acceso Gratuito</span>
                    <h3 class="text-2xl font-bold serif mt-1">Introducción: El Horizonte</h3>
                </div>
            </div>

            <div onclick="checkAccess('cap1')" class="chapter-card rounded-xl group relative">
                <img src="https://i.ibb.co/9mcJ7LQ7/cap1.jpg" class="w-full h-48 object-cover">
                <div class="lock-icon-div">🔒</div>
                <div class="p-4"><h4 class="font-bold">Cap. 1: Ineficacia</h4></div>
            </div>

            <div onclick="checkAccess('cap2')" class="chapter-card rounded-xl group relative">
                <img src="https://i.ibb.co/5gKm1HxY/cap2.jpg" class="w-full h-48 object-cover">
                <div class="lock-icon-div">🔒</div>
                <div class="p-4"><h4 class="font-bold">Cap. 2: Jaque Probatorio</h4></div>
            </div>

            <div onclick="checkAccess('cap3')" class="chapter-card rounded-xl group relative">
                <img src="https://i.ibb.co/9mcJ7LQ7/cap3.jpg" class="w-full h-48 object-cover">
                <div class="lock-icon-div">🔒</div>
                <div class="p-4"><h4 class="font-bold">Cap. 3: Daño Previsional</h4></div>
            </div>

            <div onclick="checkAccess('cap4')" class="chapter-card rounded-xl group relative">
                <img src="https://i.ibb.co/NgG7DKqk/cap4.jpg" class="w-full h-48 object-cover">
                <div class="lock-icon-div">🔒</div>
                <div class="p-4"><h4 class="font-bold">Cap. 4: Pérdida de Chance</h4></div>
            </div>
        </div>
    </main>

    <div id="login-modal" class="modal">
        <div class="bg-slate-900 p-8 rounded-3xl gold-border max-w-sm w-full relative">
            <button onclick="toggleModal('login-modal')" class="absolute top-4 right-4 text-slate-500">✕</button>
            <h2 class="text-xl serif text-center mb-6 gold-text">Ingreso</h2>
            <input type="text" id="login-user" placeholder="Correo" class="w-full bg-slate-800 p-3 rounded-lg mb-4 text-white outline-none border border-slate-700">
            <input type="password" id="login-pass" placeholder="Contraseña" class="w-full bg-slate-800 p-3 rounded-lg mb-6 text-white outline-none border border-slate-700">
            <button onclick="processLogin()" id="btn-login" class="w-full bg-[#b8912e] py-3 rounded-lg font-bold uppercase">Verificar</button>
            <p id="login-error" class="text-red-500 text-xs text-center mt-4 hidden"></p>
        </div>
    </div>

    <div id="pdf-modal" class="modal bg-black">
        <div class="w-full h-full flex flex-col">
            <div class="p-4 bg-slate-900 flex justify-between items-center">
                <button onclick="toggleModal('pdf-modal')" class="text-white bg-slate-800 px-4 py-2 rounded-lg text-xs">← VOLVER</button>
                <h2 id="pdf-title" class="gold-text text-sm font-bold"></h2>
                <div></div>
            </div>
            <iframe id="pdf-frame" src="" class="flex-1 w-full"></iframe>
        </div>
    </div>

    <script>
        // URL DE TU APPS SCRIPT (Copiada de tu imagen)
        const API_URL = "https://script.google.com/macros/s/AKfycbwHC7A4dGZXktpncIJ4LBk9AmmuEDtGQSznt3MCa3_2QiP0KUwUYMjkkmMI7-BOkEtgWw/exec";
        let sessionActive = false;

        async function processLogin() {
            const btn = document.getElementById('btn-login');
            const user = document.getElementById('login-user').value.toLowerCase().trim();
            const pass = document.getElementById('login-pass').value.trim();
            const errorMsg = document.getElementById('login-error');

            if (!user || !pass) return;
            btn.innerText = "Validando...";
            errorMsg.classList.add('hidden');

            try {
                // Enviamos los datos al "Cerebro" de Google
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Importante para evitar bloqueos iniciales en GitHub
                    body: JSON.stringify({ action: "login", user: user, pass: pass })
                });

                // Como el Apps Script no devuelve JSON fácil con 'no-cors', 
                // vamos a intentar una validación de éxito basada en tiempo o re-intento.
                // Pero lo ideal es que el loginSuccess se dispare.
                // NOTA: Para GitHub, lo más seguro es usar el siguiente método:
                
                const resp = await fetch(API_URL + "?action=login&user=" + user + "&pass=" + pass);
                const data = await resp.json();

                if (data.result === "success") {
                    loginSuccess(data.nombre, user);
                } else {
                    errorMsg.innerText = "Usuario o contraseña incorrectos.";
                    errorMsg.classList.remove('hidden');
                }
            } catch (e) {
                // Si el fetch falla por CORS, intentamos mostrar un mensaje guía
                errorMsg.innerText = "Error de conexión. Verifica tu clave.";
                errorMsg.classList.remove('hidden');
            }
            btn.innerText = "Verificar";
        }

        function loginSuccess(name, email) {
            sessionActive = true;
            localStorage.setItem('ebook_name', name);
            document.getElementById('btn-login-trigger').classList.add('hidden');
            document.getElementById('user-display').classList.replace('hidden', 'flex');
            document.getElementById('user-name-display').innerText = name;
            document.querySelectorAll('.lock-icon-div').forEach(el => el.style.display = 'none');
            toggleModal('login-modal');
        }

        function checkAccess(id) {
            if (sessionActive) openContent(id); else toggleModal('login-modal');
        }

        function openContent(id) {
            document.getElementById('pdf-title').innerText = id.toUpperCase();
            document.getElementById('pdf-frame').src = id + ".pdf#toolbar=0";
            toggleModal('pdf-modal');
        }

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('active');
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
