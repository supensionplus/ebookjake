<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAQUE MATE A LAS AFP | Supension Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --text: #f8fafc; --card: rgba(30, 41, 59, 0.5); }
        .light-mode { --bg: #f8fafc; --text: #0f172a; --card: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; }
        .serif { font-family: 'Playfair Display', serif; }
        .gold-text { color: #b8912e; }
        .gold-border { border: 1px solid #b8912e; }
        
        /* Splash Zoom */
        #splash { position: fixed; inset: 0; z-index: 1000; background: #0f172a; display: flex; align-items: center; justify-content: center; animation: fadeOut 0.5s ease 3s forwards; }
        #splash img { animation: zoomIn 3s ease-out forwards; max-width: 300px; }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1.3); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        .chapter-card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; cursor: pointer; position: relative; overflow: hidden; }
        .chapter-card:hover { border-color: #b8912e; transform: translateY(-3px); }
        .lock-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        .modal.active { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="splash"><img src="https://i.ibb.co/k2wGdLjc/portada.jpg"></div>

    <nav class="p-4 border-b border-slate-800 flex justify-between items-center sticky top-0 z-50 bg-slate-900/80 backdrop-blur">
        <div class="flex gap-2">
            <button onclick="toggleModal('login-modal')" id="btn-login-main" class="bg-[#b8912e] text-white px-4 py-2 rounded-xl text-xs font-bold uppercase">Acceso</button>
            <button onclick="toggleTheme()" class="px-3 py-2 border border-slate-700 rounded-xl text-xs">🌓</button>
        </div>
        <div id="user-info" class="hidden text-xs font-bold gold-text uppercase tracking-widest items-center gap-2">
            <span id="user-name"></span> | <button onclick="location.reload()" class="underline text-slate-500">Salir</button>
        </div>
        <img src="https://i.ibb.co/k2wGdLjc/portada.jpg" class="w-10 h-10 rounded border border-gold-border object-cover">
    </nav>

    <header class="py-10 text-center px-4">
        <h1 class="text-4xl md:text-5xl font-bold serif gold-text">JAQUE MATE A LAS AFP</h1>
        <p class="text-slate-400 mt-2 italic">Estrategia Jurídica Avanzada</p>
    </header>

    <main class="max-w-6xl mx-auto p-6 grid md:grid-cols-2 lg:grid-cols-4 gap-6">
        <div onclick="openPDF('intro')" class="chapter-card rounded-2xl col-span-full md:col-span-2 flex items-center p-4">
            <img src="https://i.ibb.co/5XVkxjpK/intro.jpg" class="w-24 h-24 rounded-lg object-cover">
            <div class="ml-4">
                <span class="text-[10px] text-green-500 font-bold uppercase">Contenido Abierto</span>
                <h3 class="text-xl font-bold serif">Introducción Definitiva</h3>
            </div>
        </div>

        <div onclick="check('cap1')" class="chapter-card rounded-xl"><img src="https://i.ibb.co/9mcJ7LQ7/cap1.jpg" class="h-40 w-full object-cover"><div class="lock-overlay" id="l1">🔒</div><div class="p-3 font-bold text-xs">Cap. 1: Ineficacia</div></div>
        <div onclick="check('cap2')" class="chapter-card rounded-xl"><img src="https://i.ibb.co/5gKm1HxY/cap2.jpg" class="h-40 w-full object-cover"><div class="lock-overlay" id="l2">🔒</div><div class="p-3 font-bold text-xs">Cap. 2: Jaque Probatorio</div></div>
        <div onclick="check('cap3')" class="chapter-card rounded-xl"><img src="https://i.ibb.co/0pMvtRSj/cap3.jpg" class="h-40 w-full object-cover"><div class="lock-overlay" id="l3">🔒</div><div class="p-3 font-bold text-xs">Cap. 3: Daño Previsional</div></div>
        <div onclick="check('cap4')" class="chapter-card rounded-xl"><img src="https://i.ibb.co/NgG7DKqk/cap4.jpg" class="h-40 w-full object-cover"><div class="lock-overlay" id="l4">🔒</div><div class="p-3 font-bold text-xs">Cap. 4: Pérdida de Chance</div></div>
        <div onclick="check('cap5')" class="chapter-card rounded-xl"><img src="https://i.ibb.co/JjGwWjZv/cap5.jpg" class="h-40 w-full object-cover"><div class="lock-overlay" id="l5">🔒</div><div class="p-3 font-bold text-xs">Cap. 5: El Método</div></div>
        <div onclick="check('cap6')" class="chapter-card rounded-xl border-gold-border/40"><img src="https://i.ibb.co/spwGWYDP/cap6.jpg" class="h-40 w-full object-cover"><div class="lock-overlay" id="l6">🔒</div><div class="p-3 font-bold gold-text text-xs">Cap. 6: Fórmula Maestra</div></div>
    </main>

    <section class="max-w-4xl mx-auto my-10 p-8 rounded-3xl bg-slate-900 border border-slate-800 text-center">
        <h2 class="text-xl font-bold serif gold-text mb-4">¿No tienes acceso todavía?</h2>
        <div class="flex flex-wrap justify-center gap-4">
            <button onclick="openPDF('resumen')" class="bg-blue-600 px-6 py-3 rounded-xl font-bold text-xs uppercase">Ver Resumen Completo</button>
            <a href="https://wa.me/573117715353" class="bg-green-600 px-6 py-3 rounded-xl font-bold text-xs uppercase">Comprar Ebook</a>
        </div>
    </section>

    <div id="login-modal" class="modal">
        <div class="bg-slate-900 p-8 rounded-3xl gold-border max-w-sm w-full relative mx-4">
            <button onclick="toggleModal('login-modal')" class="absolute top-4 right-4 text-slate-500">✕</button>
            <h2 class="text-xl serif mb-6 text-center gold-text uppercase tracking-widest font-bold">Ingreso</h2>
            <input type="text" id="u" placeholder="Correo" class="w-full bg-slate-800 p-3 rounded-xl mb-4 border border-slate-700 outline-none text-white">
            <div class="relative mb-6">
                <input type="password" id="p" placeholder="Contraseña" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none text-white">
                <button onclick="tPass()" class="absolute right-4 top-3 shadow-none">👁️</button>
            </div>
            <button onclick="login()" id="bLog" class="w-full bg-[#b8912e] py-4 rounded-xl font-bold uppercase text-sm">Validar Acceso</button>
            <p id="err" class="text-red-500 text-[10px] mt-4 text-center hidden"></p>
        </div>
    </div>

    <div id="pdf-modal" class="modal bg-black">
        <div class="w-full h-full flex flex-col">
            <div class="p-4 bg-slate-900 flex justify-between">
                <button onclick="toggleModal('pdf-modal')" class="text-white text-xs font-bold uppercase">← Cerrar</button>
                <span id="pdf-title" class="gold-text font-bold text-xs uppercase"></span>
                <div></div>
            </div>
            <iframe id="pdf-frame" src="" class="flex-1 w-full border-none"></iframe>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzw6m-5Re_xJQIU2BplmRRGO82xmys4kjqWSMRn2DB7uYdqzW5VeOuv1AEMhaFPODWTBQ/exec";
        let logged = false;
        let tInactividad;

        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function toggleModal(id) { document.getElementById(id).classList.toggle('active'); }
        function tPass() { const x = document.getElementById('p'); x.type = x.type === 'password' ? 'text' : 'password'; }

        async function login() {
            const u = document.getElementById('u').value.toLowerCase().trim();
            const p = document.getElementById('p').value.trim();
            const e = document.getElementById('err');
            const btn = document.getElementById('bLog');

            if(!u || !p) return;
            btn.innerText = "Consultando...";
            e.classList.add('hidden');

            try {
                const res = await fetch(`${API}?user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}`);
                const data = await res.json();

                if(data.result === "success") {
                    logged = true;
                    document.getElementById('btn-login-main').classList.add('hidden');
                    document.getElementById('user-info').classList.replace('hidden', 'flex');
                    document.getElementById('user-name').innerText = data.nombre;
                    document.querySelectorAll('.lock-overlay').forEach(l => l.style.display = 'none');
                    toggleModal('login-modal');
                    resetTimer();
                } else if(data.result === "expired") {
                    e.innerText = "Tu suscripción ha vencido.";
                    e.classList.remove('hidden');
                } else {
                    e.innerText = "Usuario o contraseña incorrectos.";
                    e.classList.remove('hidden');
                }
            } catch (err) {
                e.innerText = "Error de conexión. Intenta de nuevo.";
                e.classList.remove('hidden');
            }
            btn.innerText = "Validar Acceso";
        }

        function check(id) { logged ? openPDF(id) : toggleModal('login-modal'); }
        
        function openPDF(id) {
            document.getElementById('pdf-title').innerText = id;
            document.getElementById('pdf-frame').src = id + ".pdf#toolbar=0&navpanes=0";
            toggleModal('pdf-modal');
        }

        function resetTimer() {
            clearTimeout(tInactividad);
            if (logged) tInactividad = setTimeout(() => { alert("Sesión expirada por inactividad"); location.reload(); }, 300000);
        }
        window.onmousemove = resetTimer;
    </script>
</body>
</html>
